version: 2

# Keyword/entity rules for the FINE layer (see docs/taxonomy-final.md).
# - Coarse top-level comes from the GNews pool stamp (not here).
# - These rules do the sub-category (competition) routing.
# - TEAM level (football clubs) is ENTITY matching in entities.yml, not here.
# - top-stories.* is the geographic axis (⟦GEO⟧ pool_country → geo_region). Until
#   pool-aware ingestion lands, the country/domestic keywords below BRIDGE it
#   (mention-based); replace with real geo when ingestion ships.

rules:

  # ── POLITICS (⟦DERIVED⟧ from nation/world pools + these rules) ────────────────
