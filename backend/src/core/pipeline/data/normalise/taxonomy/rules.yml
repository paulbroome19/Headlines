    keywords:
      - "prime minister"
      - "downing street"
      - "westminster"
      - "house of commons"
      - "house of lords"
      - "cabinet"
      - "uk government"
      - "home secretary"
      - "foreign secretary"
      - "chancellor of the exchequer"
      - "whitehall"
      - "by-election"
      - "holyrood"
      - "senedd"
