version: 1

# ENTRY TEST — add an entity here only if ALL of the following are true:
#   1. It is an institution, organisation, company, country, team, competition, or index
#      (NOT a person — persons are transient news subjects, not durable taxonomy anchors)
#   2. Its aliases are multi-word or an unambiguous acronym in news context (NHS, NATO, HMRC)
#      Single-word surname aliases are banned — they cause false matches (see: "who", "hamilton", "swift")
#   3. It appears frequently across many different articles over months, not just a current story
#   4. Its category routing cannot be achieved by context keywords in rules.yml alone
#
# For person-led stories: classify via contextual keywords in rules.yml (e.g. "alleged victims",
# "roland garros", "formula 1") — not via adding the person to this file.

