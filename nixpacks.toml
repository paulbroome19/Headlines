# Nixpacks standalone configuration
# https://nixpacks.com/docs/configuration/file
#
# This file is referenced from railway.json via build.nixpacksConfigPath.
# Railway passes it to the Nixpacks builder, which emits [variables] as
# Docker ENV instructions in the generated Dockerfile — making them present
# at every lifecycle phase: build, release (preDeployCommand), and runtime
# (startCommand). This is the ONLY supported mechanism for baking env vars
# into the image via Nixpacks config; railway.json's nixpacksPlan.variables
# is NOT a real field in the Railway schema (https://backboard.railway.app/railway.schema.json)
# and is silently ignored.

# Declare the Python provider explicitly so Nixpacks detects the language
# even though pyproject.toml lives in backend/ rather than the repo root.
# Without this, auto-detection may fall through to a no-op provider.
providers = ["python"]

[variables]
PYTHONUNBUFFERED = "1"
PYTHONPATH = "backend/src"

# Install Poetry via Nix in the setup phase so it is on PATH when the custom
# install phase runs. Nixpacks' default Python provider installs Poetry via
# "pip install poetry" inside the install phase itself (confirmed in
# src/providers/python.rs). Our custom [phases.install] below replaces those
# defaults entirely (no "..." extension), so without this setup step poetry
# is never installed — producing "poetry: command not found" (exit 127).
#
# "..." preserves whatever Python/gcc/etc. nixPkgs the provider adds;
# "poetry" is the nixpkgs attribute name for Poetry.
# Ref: https://nixpacks.com/docs/configuration/file (nixPkgs in phases.setup)
# Ref: https://search.nixos.org/packages?channel=unstable&query=poetry
[phases.setup]
nixPkgs = ["...", "poetry"]

# Install into Nixpacks' canonical /opt/venv so alembic + uvicorn land on PATH.
#
# Root cause (issue #13): Nixpacks' Python provider normally runs:
#   python -m venv --copies /opt/venv \
#   && . /opt/venv/bin/activate \
#   && pip install poetry==$NIXPACKS_POETRY_VERSION \
#   && poetry install ...
# and calls install_phase.add_path("/opt/venv/bin") to bake /opt/venv/bin
# into the image's PATH as a Docker ENV instruction.
# (Confirmed: https://github.com/railwayapp/nixpacks/blob/main/src/providers/python.rs)
#
# Our custom [phases.install] (without "...") REPLACES those defaults entirely,
# so the /opt/venv setup and add_path call never ran. The previous fix used
# "poetry config virtualenvs.create false" to install packages into the Nix-store
# Python, but the Nix store is read-only — scripts ended up in an unpredictable
# writable location that was NOT on PATH, causing "alembic: command not found"
# at pre-deploy and "uvicorn: command not found" at runtime.
#
# Fix (approach a): recreate the /opt/venv setup exactly as Nixpacks would,
# and use the `paths` field to bake /opt/venv/bin onto PATH as a Docker ENV
# instruction. Because this is a Docker image-level ENV, /opt/venv/bin is
# present at ALL lifecycle phases: build, pre-deploy (preDeployCommand), and
# runtime (startCommand) — so both `alembic` and `uvicorn` resolve identically.
#
# Poetry runs inside the activated venv, so all console scripts (alembic,
# uvicorn, etc.) are installed to /opt/venv/bin. No virtualenvs.create=false
# needed (and no longer used).
#
# Ref: https://nixpacks.com/docs/providers/python ("A venv is created at
#   /opt/venv and PATH is modified to use the venv python binary.")
# Ref: https://nixpacks.com/docs/configuration/file (paths field)
[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate",
  "cd backend && poetry install -E s3"
]
paths = ["/opt/venv/bin"]
